version: 2
updates:
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
    # Security-only: disable routine version bumps; only open PRs for CVEs.
    open-pull-requests-limit: 0
    groups:
      security:
        applies-to: security-updates
        patterns:
          - "*"
    assignees:
      - diogopms
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    # Security-only: disable routine version bumps; only open PRs for CVEs.
    open-pull-requests-limit: 0
    groups:
      security:
        applies-to: security-updates
        patterns:
          - "*"
    assignees:
      - diogopms
